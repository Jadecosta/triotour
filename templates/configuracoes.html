{% extends 'base.html' %}{% block content %}<h1>Configurações da empresa</h1><form class="card form" method="post"><input required name="nome" value="{{cfg.nome}}" placeholder="Nome da empresa"><div class="cols"><input name="telefone" value="{{cfg.telefone or ''}}" placeholder="Telefone"><input name="whatsapp" value="{{cfg.whatsapp or ''}}" placeholder="WhatsApp"></div><div class="cols"><input name="email" value="{{cfg.email or ''}}" placeholder="E-mail"><input name="instagram" value="{{cfg.instagram or ''}}" placeholder="Instagram"></div><input name="endereco" value="{{cfg.endereco or ''}}" placeholder="Endereço"><input name="slogan" value="{{cfg.slogan or ''}}" placeholder="Slogan"><input name="logo" value="{{cfg.logo or ''}}" placeholder="URL do logo"><textarea rows="8" name="termos_padrao">{{cfg.termos_padrao}}</textarea><button class="primary">Salvar configurações</button></form>{% endblock %}
