{% extends 'base.html' %}{% block content %}<h1>Clientes</h1><form class="card form" method="post"><h2>Novo cliente</h2><input required name="nome" placeholder="Nome completo"><input name="telefone" placeholder="Telefone/WhatsApp"><input type="email" name="email" placeholder="E-mail"><input name="documento" placeholder="CPF ou documento"><textarea name="observacoes" placeholder="Observações"></textarea><button class="primary">Salvar cliente</button></form><div class="grid cards">{% for c in clientes %}<form class="card form" method="post" action="{{ url_for('editar_cliente', id=c.id) }}"><input required name="nome" value="{{c.nome}}"><input name="telefone" value="{{c.telefone or ''}}"><input name="email" value="{{c.email or ''}}"><input name="documento" value="{{c.documento or ''}}"><textarea name="observacoes">{{c.observacoes or ''}}</textarea><button>Atualizar</button></form>{% endfor %}</div>{% endblock %}
