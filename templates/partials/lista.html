<div class="packages-grid proposals-list">{% for p in propostas %}<article class="card package-card"><div class="card-content"><span class="badge">{{p.tipo}} · {{p.status}}</span><h3>{{p.titulo}}</h3><p><b>Cliente:</b> {{p.cliente}}</p><p><b>Destino:</b> {{p.destino}} · {{p.data_inicio|br_date}}</p><p><b>Valor:</b> {{p.valor_total|money}}</p><div class="actions card-actions"><a href="{{ url_for('view_proposta', id=p.id) }}">Visualizar</a><a href="{{ url_for('edit_proposta', id=p.id) }}">Editar</a><form method="post" action="{{ url_for('duplicar', id=p.id) }}"><button>Duplicar</button></form><form method="post" action="{{ url_for('status', id=p.id) }}"><select name="status" onchange="this.form.submit()"><option>{{p.status}}</option>{% for s in ['rascunho','enviada','aprovada','cancelada'] %}<option>{{s}}</option>{% endfor %}</select></form><form method="post" action="{{ url_for('excluir', id=p.id) }}" onsubmit="return confirm('Excluir?')"><button class="danger">Excluir</button></form></div></div></article>{% else %}<p>Nenhuma proposta encontrada.</p>{% endfor %}</div>
